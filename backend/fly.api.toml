app = 'stockapp-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'
  [build.args]
    TARGET = 'server'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/healthz'
  protocol = 'http'
  timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
