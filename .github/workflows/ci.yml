name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel any in-flight run when a new commit lands on the same branch —
# saves CI minutes on fast-follow pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Match the `go` directive in backend/go.mod
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    # Only build images on main merges — PRs don't need the cost.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: stockapp-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: stockapp-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # Deploy the Go API + price worker to Fly.io on every main merge once
  # build/test/vet have all passed. Frontend is on Vercel and auto-deploys
  # from GitHub directly, so it has no job here. The two Fly apps share a
  # Dockerfile but use different TARGET build args, so we deploy them in
  # parallel rather than sequentially.
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: stockapp-api
            config: fly.api.toml
          - app: stockapp-worker
            config: fly.worker.toml
    concurrency:
      # Serialise per-app deploys so two pushes in quick succession don't
      # stomp on each other (Fly will reject overlapping deploys anyway).
      group: fly-deploy-${{ matrix.app }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ${{ matrix.app }}
        working-directory: backend
        env:
          # Per-app deploy tokens scope each runner to exactly one app, so
          # a leaked token can't deploy the other.
          FLY_API_TOKEN: ${{ matrix.app == 'stockapp-api' && secrets.FLY_API_TOKEN_SERVER || secrets.FLY_API_TOKEN_WORKER }}
        run: flyctl deploy --config ${{ matrix.config }} --app ${{ matrix.app }} --remote-only
